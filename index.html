<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog der NS-Opferlager in Österreich</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }

header { background: #2c3e50; color: #fff; padding: 1rem 1.5rem; }
header h1 { font-size: 1.3rem; font-weight: 600; }
header p { font-size: .85rem; opacity: .8; margin-top: .25rem; }

/* layout */
.app { display: flex; flex-direction: column; height: calc(100vh - 70px); }
.top-bar { display: flex; flex-wrap: wrap; gap: .6rem; padding: .75rem 1rem; background: #fff; border-bottom: 1px solid #ddd; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: .15rem; }
.filter-group label { font-size: .75rem; font-weight: 600; color: #555; }
.filter-group select, .filter-group input { font-size: .85rem; padding: .35rem .5rem; border: 1px solid #ccc; border-radius: 4px; height: 32px; }
.filter-group select { cursor: pointer; }
#bundesland { width: 170px; }
#gemeinde { width: 220px; }
#freitext { width: 220px; }
.count { font-size: .8rem; color: #666; margin-left: auto; white-space: nowrap; align-self: flex-end; padding-bottom: .25rem; }
.view-toggle { display: flex; gap: 0; align-self: flex-end; }
.view-toggle button { font-size: .8rem; padding: .35rem .75rem; border: 1px solid #ccc; background: #fff; cursor: pointer; height: 32px; }
.view-toggle button:first-child { border-radius: 4px 0 0 4px; }
.view-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: 0; }
.view-toggle button.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
.btn-reset { font-size: .8rem; padding: .35rem .6rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; height: 32px; color: #888; align-self: flex-end; }
.btn-reset:hover { background: #f0f0f0; color: #333; }

/* autocomplete */
.autocomplete-wrap { position: relative; }
.autocomplete-wrap input { width: 100%; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; max-height: 260px; overflow-y: auto; background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; z-index: 2000; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.ac-list.open { display: block; }
.ac-item { padding: .4rem .6rem; font-size: .84rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
.ac-item:hover, .ac-item.active { background: #eef3f8; }
.ac-item .ac-count { float: right; color: #aaa; font-size: .75rem; }
.ac-item.selected { font-weight: 600; color: #2c3e50; }
.ac-hint { padding: .4rem .6rem; font-size: .78rem; color: #999; }

.main { flex: 1; display: flex; min-height: 0; position: relative; }

/* map */
#map { width: 100%; height: 100%; display: none; }
#map.visible { display: block; }

/* table */
.table-wrap { width: 100%; height: 100%; overflow: auto; display: none; }
.table-wrap.visible { display: block; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
thead { position: sticky; top: 0; z-index: 2; }
th { background: #34495e; color: #fff; padding: .5rem .6rem; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { background: #3d566e; }
th .arrow { font-size: .7rem; margin-left: .25rem; }
td { padding: .45rem .6rem; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
tr:hover td { background: #eef3f8; }
tr.no-coords td { color: #888; }
td.wrap { max-width: 300px; white-space: normal; word-break: break-word; }
td.nowrap { white-space: nowrap; }

/* detail panel */
.detail-panel { display: none; position: absolute; top: 0; right: 0; width: 380px; height: 100%; background: #fff; border-left: 1px solid #ccc; z-index: 1000; overflow-y: auto; box-shadow: -2px 0 8px rgba(0,0,0,.12); }
.detail-panel.open { display: block; }
.detail-panel .close-btn { position: absolute; top: .5rem; right: .75rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; }
.detail-panel .close-btn:hover { color: #000; }
.detail-panel h2 { font-size: 1rem; padding: 1rem 1rem .5rem; color: #2c3e50; }
.detail-panel dl { padding: 0 1rem 1rem; }
.detail-panel dt { font-size: .75rem; font-weight: 600; color: #888; margin-top: .6rem; }
.detail-panel dd { font-size: .85rem; margin: .15rem 0 0; }

/* popup */
.leaflet-popup-content { font-size: .82rem; line-height: 1.4; max-width: 300px; }
.leaflet-popup-content strong { color: #2c3e50; }

@media (max-width: 700px) {
  #gemeinde, #freitext { width: 100%; }
  .detail-panel { width: 100%; }
}
</style>
</head>
<body>

<header>
  <h1>Katalog der NS-Opferlager in &Ouml;sterreich</h1>
  <p>Stand: 31. J&auml;nner 2022 &mdash; Bundesdenkmalamt</p>
</header>

<div class="app">
  <div class="top-bar">
    <div class="filter-group">
      <label for="bundesland">Bundesland</label>
      <select id="bundesland">
        <option value="">Alle</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="gemeinde">Gemeinde</label>
      <div class="autocomplete-wrap">
        <input id="gemeinde" type="text" placeholder="Alle Gemeinden" autocomplete="off">
        <div class="ac-list" id="gemeinde-list"></div>
      </div>
    </div>
    <div class="filter-group">
      <label for="freitext">Freitext</label>
      <input id="freitext" type="text" placeholder="Lager, Geschichte, Literatur&hellip;">
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <label style="font-weight:normal;font-size:.82rem;display:flex;align-items:center;gap:.3rem;height:32px">
        <input type="checkbox" id="onlyCoords"> Nur mit Koordinaten
      </label>
    </div>
    <button class="btn-reset" id="btn-reset" title="Alle Filter zurücksetzen">&#x21bb; Reset</button>
    <div class="view-toggle">
      <button id="btn-map" class="active">Karte</button>
      <button id="btn-table">Tabelle</button>
    </div>
    <span class="count" id="count"></span>
  </div>

  <div class="main">
    <div id="map" class="visible"></div>
    <div class="table-wrap" id="tableWrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="detail-panel" id="detail">
      <button class="close-btn" id="detail-close">&times;</button>
      <h2 id="detail-title"></h2>
      <dl id="detail-dl"></dl>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script>
// ========== DATA ==========
let DATA = [];

// ========== Color map ==========
const BL_COLORS = {
  'Burgenland': '#e6194b',  'Kärnten': '#3cb44b',
  'Niederösterreich': '#4363d8', 'Oberösterreich': '#f58231',
  'Salzburg': '#911eb4',  'Steiermark': '#42d4f4',
  'Tirol': '#f032e6',  'Vorarlberg': '#bfef45',  'Wien': '#e6beff',
};

// ========== State ==========
let map, markerGroup, markers = [];
let currentView = 'map';
let sortCol = null, sortAsc = true;
let filtered = [];
let selectedGemeinde = '';   // currently selected Gemeinde filter
let gemeindeIndex = {};      // { gemeindeName: count } — rebuilt when Bundesland changes

const COLS = [
  { key: 'Bundesland', label: 'Bundesland', cls: 'nowrap' },
  { key: 'Politische Gemeinde', label: 'Gemeinde', cls: 'nowrap' },
  { key: 'Lagerbezeichnung', label: 'Lagerbezeichnung', cls: 'wrap' },
  { key: 'Lagerinsassen und Geschichte', label: 'Geschichte', cls: 'wrap' },
  { key: 'Lokalisierung', label: 'Lokalisierung', cls: 'wrap' },
  { key: 'Grundstücksnummern', label: 'Grundst.', cls: 'wrap' },
  { key: 'Koordinaten', label: 'Koord.', cls: 'nowrap' },
  { key: 'Literatur und Quellenangaben', label: 'Literatur', cls: 'wrap' },
];

// ========== Init ==========
async function init() {
  const resp = await fetch('data.json');
  DATA = await resp.json();

  // Populate Bundesland
  const bls = [...new Set(DATA.map(d => d.Bundesland))].sort();
  const sel = document.getElementById('bundesland');
  bls.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; sel.appendChild(o); });

  // Build initial Gemeinde index
  rebuildGemeindeIndex();

  // Init map
  map = L.map('map').setView([47.5, 14.5], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);
  markerGroup = L.markerClusterGroup({ maxClusterRadius: 45, spiderfyOnMaxZoom: true, showCoverageOnHover: false, chunkedLoading: true });
  map.addLayer(markerGroup);

  // Build table header
  const tr = document.getElementById('thead-row');
  COLS.forEach((c, i) => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.innerHTML += ' <span class="arrow"></span>';
    th.onclick = () => toggleSort(i);
    tr.appendChild(th);
  });

  // Events
  document.getElementById('bundesland').addEventListener('change', () => {
    rebuildGemeindeIndex();
    clearGemeinde();
    applyFilters();
  });
  document.getElementById('freitext').addEventListener('input', debounce(applyFilters, 200));
  document.getElementById('onlyCoords').addEventListener('change', applyFilters);
  document.getElementById('btn-map').addEventListener('click', () => setView('map'));
  document.getElementById('btn-table').addEventListener('click', () => setView('table'));
  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.getElementById('btn-reset').addEventListener('click', resetFilters);

  // Gemeinde autocomplete events
  initGemeindeAutocomplete();

  applyFilters();
}

// ========== Gemeinde index ==========
function rebuildGemeindeIndex() {
  const bl = document.getElementById('bundesland').value;
  const counts = {};
  DATA.forEach(d => {
    if (bl && d.Bundesland !== bl) return;
    const g = d['Politische Gemeinde'];
    counts[g] = (counts[g] || 0) + 1;
  });
  gemeindeIndex = counts;
}

// ========== Gemeinde autocomplete ==========
function initGemeindeAutocomplete() {
  const input = document.getElementById('gemeinde');
  const list = document.getElementById('gemeinde-list');
  let activeIdx = -1;

  function render(query) {
    const q = query.toLowerCase();
    // Sort: exact prefix matches first, then includes, then alphabetical
    let entries = Object.entries(gemeindeIndex); // [name, count]
    if (q) {
      entries = entries.filter(([name]) => name.toLowerCase().includes(q));
      entries.sort((a, b) => {
        const aLow = a[0].toLowerCase(), bLow = b[0].toLowerCase();
        const aPrefix = aLow.startsWith(q), bPrefix = bLow.startsWith(q);
        if (aPrefix !== bPrefix) return aPrefix ? -1 : 1;
        return aLow.localeCompare(bLow, 'de');
      });
    } else {
      entries.sort((a, b) => a[0].localeCompare(b[0], 'de'));
    }
    entries = entries.slice(0, 80); // limit for performance

    if (entries.length === 0) {
      list.innerHTML = '<div class="ac-hint">Keine Treffer</div>';
      list.classList.add('open');
      activeIdx = -1;
      return;
    }

    list.innerHTML = entries.map(([name, count], i) =>
      `<div class="ac-item${name === selectedGemeinde ? ' selected' : ''}" data-val="${esc(name)}" data-idx="${i}">` +
      `${esc(name)}<span class="ac-count">${count}</span></div>`
    ).join('');
    list.classList.add('open');
    activeIdx = -1;
  }

  function select(name) {
    selectedGemeinde = name;
    input.value = name;
    list.classList.remove('open');
    applyFilters();
  }

  function clearList() {
    setTimeout(() => list.classList.remove('open'), 150);
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => {
    selectedGemeinde = '';  // clear selection while typing
    render(input.value);
    debounce(applyFilters, 200)();
  });
  input.addEventListener('blur', clearList);

  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      updateActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      updateActive(items);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && items[activeIdx]) {
        select(items[activeIdx].dataset.val);
      } else if (items.length === 1) {
        select(items[0].dataset.val);
      }
    } else if (e.key === 'Escape') {
      list.classList.remove('open');
      input.blur();
    }
  });

  list.addEventListener('mousedown', e => {
    const item = e.target.closest('.ac-item');
    if (item) { e.preventDefault(); select(item.dataset.val); }
  });

  function updateActive(items) {
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
  }
}

function clearGemeinde() {
  selectedGemeinde = '';
  document.getElementById('gemeinde').value = '';
}

function resetFilters() {
  document.getElementById('bundesland').value = '';
  document.getElementById('freitext').value = '';
  document.getElementById('onlyCoords').checked = false;
  rebuildGemeindeIndex();
  clearGemeinde();
  applyFilters();
}

// ========== Filtering ==========
function applyFilters() {
  const bl = document.getElementById('bundesland').value;
  const gInput = document.getElementById('gemeinde').value.trim().toLowerCase();
  const gExact = selectedGemeinde; // exact match from dropdown selection
  const q = document.getElementById('freitext').value.trim().toLowerCase();
  const onlyC = document.getElementById('onlyCoords').checked;

  filtered = DATA.filter(d => {
    if (bl && d.Bundesland !== bl) return false;
    if (onlyC && d.lon == null) return false;

    // Gemeinde filter
    if (gExact) {
      if (d['Politische Gemeinde'] !== gExact) return false;
    } else if (gInput) {
      if (!d['Politische Gemeinde'].toLowerCase().includes(gInput)) return false;
    }

    // Free text
    if (q) {
      const hay = [
        d.Bundesland, d['Politische Gemeinde'], d.Lagerbezeichnung,
        d['Lagerinsassen und Geschichte'], d.Lokalisierung,
        d['Literatur und Quellenangaben'],
      ].join(' ').toLowerCase();
      const words = q.split(/\s+/);
      if (!words.every(w => hay.includes(w))) return false;
    }
    return true;
  });

  document.getElementById('count').textContent =
    `${filtered.length} von ${DATA.length} Einträgen` +
    (filtered.filter(d => d.lon != null).length < filtered.length
      ? ` (${filtered.filter(d => d.lon != null).length} auf Karte)` : '');

  updateMap();
  updateTable();
}

// ========== Map ==========
function updateMap() {
  markerGroup.clearLayers();
  markers = [];
  filtered.forEach(d => {
    if (d.lon == null) return;
    const color = BL_COLORS[d.Bundesland] || '#999';
    const icon = L.divIcon({
      className: '',
      html: `<svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="${color}" stroke="#fff" stroke-width="1.5" opacity=".85"/></svg>`,
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    const m = L.marker([d.lat, d.lon], { icon });
    m.bindPopup(() => popupHtml(d), { maxWidth: 320 });
    m.on('click', () => showDetail(d));
    markers.push(m);
    markerGroup.addLayer(m);
  });
  if (markers.length > 0) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.05));
  }
}

function popupHtml(d) {
  return `<strong>${esc(d['Politische Gemeinde'])}</strong><br>
${esc(d.Lagerbezeichnung)}<br>
<span style="color:#666">${esc(d.Bundesland)}</span>`;
}

// ========== Detail panel ==========
function showDetail(d) {
  const panel = document.getElementById('detail');
  document.getElementById('detail-title').textContent =
    d['Politische Gemeinde'] + ' — ' + d.Lagerbezeichnung;
  const dl = document.getElementById('detail-dl');
  dl.innerHTML = '';
  [
    ['Bundesland', d.Bundesland],
    ['Politische Gemeinde', d['Politische Gemeinde']],
    ['Lagerbezeichnung', d.Lagerbezeichnung],
    ['Lagerinsassen und Geschichte', d['Lagerinsassen und Geschichte']],
    ['Lokalisierung', d.Lokalisierung],
    ['Grundstücksnummern', d.Grundstücksnummern],
    ['Koordinaten', d.Koordinaten],
    ['Literatur und Quellenangaben', d['Literatur und Quellenangaben']],
  ].forEach(([label, val]) => {
    if (!val) return;
    const dt = document.createElement('dt'); dt.textContent = label;
    const dd = document.createElement('dd'); dd.innerHTML = linkify(esc(val));
    dl.appendChild(dt); dl.appendChild(dd);
  });
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

// ========== Table ==========
function updateTable() {
  const tbody = document.getElementById('tbody');
  let rows = [...filtered];
  if (sortCol !== null) {
    const key = COLS[sortCol].key;
    rows.sort((a, b) => {
      const va = (a[key] || '').toLowerCase(), vb = (b[key] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb, 'de') : vb.localeCompare(va, 'de');
    });
  }
  const MAX = 500;
  const slice = rows.slice(0, MAX);
  let html = '';
  slice.forEach(d => {
    const cls = d.lon == null ? ' class="no-coords"' : '';
    html += `<tr${cls}>`;
    COLS.forEach(c => { html += `<td class="${c.cls}">${linkify(esc(d[c.key] || ''))}</td>`; });
    html += '</tr>';
  });
  if (rows.length > MAX) {
    html += `<tr><td colspan="${COLS.length}" style="text-align:center;padding:1rem;color:#999">
      Zeige ${MAX} von ${rows.length} Einträgen. Bitte Suche verfeinern.</td></tr>`;
  }
  tbody.innerHTML = html;
  document.querySelectorAll('#thead-row th').forEach((th, i) => {
    th.querySelector('.arrow').textContent = sortCol === i ? (sortAsc ? '▲' : '▼') : '';
  });
}

function toggleSort(i) {
  if (sortCol === i) sortAsc = !sortAsc;
  else { sortCol = i; sortAsc = true; }
  updateTable();
}

// ========== View toggle ==========
function setView(v) {
  currentView = v;
  document.getElementById('map').classList.toggle('visible', v === 'map');
  document.getElementById('tableWrap').classList.toggle('visible', v === 'table');
  document.getElementById('btn-map').classList.toggle('active', v === 'map');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  if (v === 'map') { map.invalidateSize(); closeDetail(); }
}

// ========== Util ==========
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function linkify(s) { return s.replace(/(https?:\/\/[^\s<,;]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

// ========== Boot ==========
init();
</script>
</body>
</html>
